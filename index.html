____&quot;,[52,logseq____&quot;^Vlogseq____&quot;,54,536870926]],[logseq____&quot;^15logseq____&quot;,[52,logseq____&quot;^Ulogseq____&quot;,45,536870926]],[logseq____&quot;^15logseq____&quot;,[52,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65a81140-5369-4db4-88cc-8c44ee2813eblogseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[53,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;曾經我帶領一個QA團隊在做一個跨國的金融專案，工程師大部分都是在國外，那也因為我們的自動化測試做得很好所以一開始是 24 個人做這個案字，到最後剩 13 個人但卻可以同時做三個案子，因為自動化做完之後其實我們每次的 regression 都很快，所以有能力再接更多的案子。不過這邊的代價是，像我每天早上一到公司我就得花一到兩個小時檢查為何昨天的pipeline 會跑失敗，那當然可能的原因是 developer check-in了新的程式的代碼或者是他的代碼造成了其他的 bug 跟 side effect，當然也有可能是自動化測試的 flaky 問題。這樣其實也做了幾年直到有一天我突然想到為什麼我每天都要花時間在這些事情上面，難道這些時間不能拿來做更好的利用嗎？回頭來看這件事情是 Developer 的錯嗎？他不過就只是提交了他的代碼而已。那這件事情是AE的錯嗎，也不是呀，因為我們的 automation，如果 single thread 在跑需要跑個6 個小時左右吧，你就可以知道那個裡面有數百數千隻的 integration 測試，當然我們是把它做得很好，只要沒有新的代碼進來它不管跑幾次結果都是99%、100% ，所以我們是很有自信的，所以這也不是 AE 的錯。總歸來講就是這個 process 本身就是這麼不合理，為什麼一件事情就得拆成兩階段去完成呢？！所以這些數百支數千支的 test automations， developer 會來看嗎？就我做了這麼多的案子，從來沒有而且Developer 做自己的 unit test，AE 做自己的Integration 跟 End-to-End，這些都帶來非常多的 test coverage 的重複，也因為各做各的，其實就算 pipeline 跑完了也沒有人能夠了解全部的測試內容，更不用說對於 pipeline 結果能夠帶來什麼樣的信心，在上版前還是需要搭配許多的手動測試！logseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[53,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^17logseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[53,logseq____&quot;^Flogseq____&quot;,105,536870926]],[logseq____&quot;^15logseq____&quot;,[53,logseq____&quot;^Xlogseq____&quot;,45,536870926]],[logseq____&quot;^15logseq____&quot;,[53,logseq____&quot;^Vlogseq____&quot;,49,536870926]],[logseq____&quot;^15logseq____&quot;,[53,logseq____&quot;^Ulogseq____&quot;,45,536870926]],[logseq____&quot;^15logseq____&quot;,[53,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65a81140-8697-480d-9d32-aea223bc6210logseq____&quot;,536870926]],[logseq____&quot;^15logseq____&quot;,[54,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;#### uot;^;logseq____&quot;,logseq____&quot;~u65a81141-ab05-4a61-bd4d-4b0d27dfee3alogseq____&quot;,536870954]],[logseq____&quot;^15logseq____&quot;,[528,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;通常一個使用者故事能放進精煉會議做 AC 的討論，一般是經過以下三步驟：\\n* Phase 0 - Preparation of user stories (PO to prioritize, remove dependencies)：通常由 tech lead 與 PO 做先行的討論與排序出重要性並找出無其它依賴能做更細節展開討論的項目。\\n* Phase 1 - Estimate and split stories, consume / maintain product backlog：會議中 PO 說明故事卡內容並交由大家根據複雜度去估點或分拆為更小的使用者故事，重複步驟直到使用者故事複雜度小於 8 或 13 點 (根據團隊習慣)。\\n* Phase 2 - Key examples / acceptance criteria (for story point under 8/13)：對於夠小的故事根據重要性於會議中開始討論並產出此故事的驗收條件 (Acceptance Criteria)。logseq____&quot;,536870954]],[logseq____&quot;^15logseq____&quot;,[528,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^17logseq____&quot;,536870954]],[logseq____&quot;^15logseq____&quot;,[528,logseq____&quot;^Flogseq____&quot;,523,536870954]],[logseq____&quot;^15logseq____&quot;,[528,logseq____&quot;^Xlogseq____&quot;,132,536870954]],[logseq____&quot;^15logseq____&quot;,[528,logseq____&quot;^Vlogseq____&quot;,523,536870954]],[logseq____&quot;^15logseq____&quot;,[528,logseq____&quot;^Ulogseq____&quot;,132,536870954]],[logseq____&quot;^15logseq____&quot;,[528,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u65a81141-9530-4af8-902f-f2be98534955logseq____&quot;,536870954]],[logseq____&quot;^15logseq____&quot;,[529,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;logseq____&lt;inslogseq____&gt;會議內實行方法logseq____&lt;/inslogseq____&gt;\\nSo, as a planner, just prepare your story card and maybe some wireframe which can inspire the imagination, so that team can discuss the scenarios with real data.\\n* Divide team into several groups\\n如果人數足夠，可以把團隊分為幾組，每一組內盡量包含功能團隊的各種角色。\\n* 7 mins for each round\\n以 7 分鐘為一個輪 (timebox)，分組下去討論。\\n* Explain AC to whole team\\n一輪之後，各團隊輪流解釋成果給其它人聽，其它的隊伍可以提出問題質問。每團隊都講過後，各自再下去修改自己團隊的提案。\\n* 2 ~ 3 rounds for each story\\n兩至三輪後，團隊內應該可以對這個使用者故事能有一個基本的共識了。最後就算自己不是負責這個使用者故事的代碼實現，但是也因為參與過討論，也會了解這個使用者
