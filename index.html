___&quot;^15logseq____&quot;,[98,logseq____&quot;^Blogseq____&quot;,1720524375927,536870927]],[logseq____&quot;^15logseq____&quot;,[98,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u668d1e59-1118-4cb9-9cbf-6c95c33f8f9flogseq____&quot;,536870956]],[logseq____&quot;^15logseq____&quot;,[99,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;==測試驅動開發必須以清晰的需求為核心，不明確的需求會導致後續的 rework，影響速度。==\\n在 PBR Meeting 的產出中，每個 user story 的 Acceptance Criteria (AC) 也正是 Definition of Ready (DoR) 的一部分。每個 User Story 一般只有三、五個驗收條件，相比數十隻 test cases，developer 更願意嘗試這三到五個的自動化測試。有了 AC，developer、QA 或 AE 才能針對每一個 AC 進行自動化驗收實作討論，到底要在哪一些層級去做自動化來驗收這個驗收條件是最有效率的，這樣做才能避免所謂的 test coverage 的 duplication。而絕對不是 developer 寫自己的 UT，而 AE 負責 integration 與 end-to-end testing 的自動化，互不討論。詳見 [pipelinedriven.org](pipelinedriven.org)，雖然裡面用詞與實例化需求不同，但概念是可以相通的！logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[99,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^18logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[99,logseq____&quot;^Flogseq____&quot;,168,536870927]],[logseq____&quot;^15logseq____&quot;,[99,logseq____&quot;^Xlogseq____&quot;,96,536870927]],[logseq____&quot;^15logseq____&quot;,[99,logseq____&quot;^Vlogseq____&quot;,122,536870927]],[logseq____&quot;^15logseq____&quot;,[99,logseq____&quot;^Ulogseq____&quot;,96,536870927]],[logseq____&quot;^15logseq____&quot;,[99,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u668d1e57-ee75-4ce4-8bad-de94e647504alogseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[100,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;![](https://files.speakerdeck.com/presentations/8e24732701ff45af870421e9abd29e4a/slide_26.jpg)\\n![](https://files.speakerdeck.com/presentations/8e24732701ff45af870421e9abd29e4a/slide_27.jpg)\\n![](https://files.speakerdeck.com/presentations/8e24732701ff45af870421e9abd29e4a/slide_28.jpg)\\n![](https://files.speakerdeck.com/presentations/8e24732701ff45af870421e9abd29e4a/slide_29.jpg){:height 395, :width 68 ions/8e24732701ff45af870421e9abd29e4a/slide_15.jpg)\\n#+BEGIN_QUOTE\\nSally realized that it wasn’t necessary for the software to be perfect and bug free at the moment that it was released to the readers. “The risk of not getting software to our users is greater”  [ref: what-really-happens-when-you-deliver-software-quickly](video https://www.youtube.com/watch?v=L-WOJmCcA9g)\\n#+END_QUOTE \\n![](https://speakerd.s3.amazonaws.com/presentations/8e24732701ff45af870421e9abd29e4a/slide_16.jpg)這邊常會有誤會，舉例來說，葉問葉師傅可以一次打 20 個，這是一個苦練出來的能力，但不代表他每天都要出去打 20 個，難道要打到沒朋友？對企業來講也是一樣，我能夠做到 multiple release a day，那我可以根據商業的需求改成 daily、weekly 或是 monthly release 都是沒問題的。但反過來說，哪天當 biz 醒過來，要求你做到更快速地交付時，你有辦法嗎？其實是很難的，因為這是要長時間培養的能力！==所以不要抱怨 planner 要求的功能做出來都沒有人用，你的 pipeline 能提供簡單、快速、低成本的 A/B testing 來讓他可以快速去驗證他的假設嗎？==logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[102,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^18logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[102,logseq____&quot;^Flogseq____&quot;,151,536870927]],[logseq____&quot;^15logseq____&quot;,[102,logseq____&quot;^Xlogseq____&quot;,96,536870927]],[logseq____&quot;^15logseq____&quot;,[102,logseq____&quot;^Vlogseq____&quot;,154,536870927]],[logseq____&quot;^15logseq____&quot;,[102,logseq____&quot;^Ulogseq____&quot;,96,536870927]],[logseq____&quot;^15logseq____&quot;,[102,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u668d1e57-51ac-4659-9d6f-493fd7af65eflogseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[103,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;==當然這些不合理、沒有效率的事情在今天要講的單主幹開發裡面，它幾乎不存在！==當理解了背後的原理，我就決定要去推廣所這謂 DevOps 的 Elite culture。logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[103,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^18logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[103,logseq____&quot;^Flogseq____&quot;,174,536870927]],[logseq____&quot;^15logseq____&quot;,[103,logseq____&quot;^Xlogseq____&quot;,96,536870927]],[l 6logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[111,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;曾經我帶領一個QA團隊在做一個跨國的金融專案，工程師大部分都是在國外，那也因為我們的自動化測試做得很好所以一開始是 24 個人做這個案字，到最後剩 13 個人但卻可以同時做三個案子，因為自動化做完之後其實我們每次的 regression 都很快，所以有能力再接更多的案子。不過這邊的代價是，像我每天早上一到公司我就得花一到兩個小時檢查為何昨天的pipeline 會跑失敗，那當然可能的原因是 developer check-in了新的程式的代碼或者是他的代碼造成了其他的 bug 跟 side effect，當然也有可能是自動化測試的 flaky 問題。這樣其實也做了幾年直到有一天我突然想到為什麼我每天都要花時間在這些事情上面，難道這些時間不能拿來做更好的利用嗎？回頭來看這件事情是 Developer 的錯嗎？他不過就只是提交了他的代碼而已。那這件事情是AE的錯嗎，也不是呀，因為我們的 automation，如果 single thread 在跑需要跑個6 個小時左右吧，你就可以知道那個裡面有數百數千隻的 integration 測試，當然我們是把它做得很好，只要沒有新的代碼進來它不管跑幾次結果都是99%、100% ，所以我們是很有自信的，所以這也不是 AE 的錯。總歸來講就是這個 process 本身就是這麼不合理，為什麼一件事情就得拆成兩階段去完成呢？！所以這些數百支數千支的 test automations， developer 會來看嗎？就我做了這麼多的案子，從來沒有而且Developer 做自己的 unit test，AE 做自己的Integration 跟 End-to-End，這些都帶來非常多的 test coverage 的重複，也因為各做各的，其實就算 pipeline 跑完了也沒有人能夠了解全部的測試內容，更不用說對於 pipeline 結果能夠帶來什麼樣的信心，在上版前還是需要搭配許多的手動測試！logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[111,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^18logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[111,logseq____&quot;^Flogseq____&quot;,138,536870927]],[logseq____&quot;^15logseq____&quot;,[111,logseq____&quot;^Xlogseq____&quot;,96,536870927]],[logseq____&quot;^15logseq____&quot;,[111,logseq____&quot;^Vlogseq____&quot;,174,536870927]],[logseq____&quot;^15logseq____&quot;,[111,logseq____&quot;^Ulogseq____&quot;,96,536870927]],[logseq____&quot;^15logseq____&quot;,[111,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u668d1e57-f3ef-4a95-9621-bb8159ada6e9logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[112,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;![](https://files.speakerdeck.com/presentations/8e24732701ff45af870421e9abd29e4a/slide_39.jpg)logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&quot;,[112,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^18logseq____&quot;,536870927]],[logseq____&quot;^15logseq____&q ers cognitive load on developers without abstracting away context and underlying technologies.== Following best practices, platform teams treat their platform as a product and build it based on user research, maintain and continuously improve it.  (source: internaldeveloperplatform.org)\\n內部開發人員平台 （IDP） 由平台團隊構建，用於構建黃金路徑並實現開發人員自助服務。IDP 由許多不同的技術和工具組成，它們以一種降低開發人員認知負荷的方式粘合在一起，但開發者仍然能夠理解和掌握底層系統的細節，不會因為平台的簡化而對系統失去掌控。然後遵循最佳實踐，平台團隊將他們的平台視為產品，並根據使用者研究構建、維護和持續改進它。\\n#+END_QUOTE\\n從上面敘述，大家應該了解，==平台工程包含技術面與非技術面向的變革推動！\\b==技術部分，就像平台工程，某種程度上也就是用大量自動化的方式在做標準化使用及鋪平道路，但這篇內容會著重在非技術部份。logseq____&quot;,536870928]],[logseq____&quot;^15logseq____&quot;,[199,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^18logseq____&quot;,536870928]],[logseq____&quot;^15logseq____&quot;,[199,logseq____&quot;^Flogseq____&quot;,205,536870928]],[logseq____&quot;^15logseq____&quot;,[199,logseq____&quot;^Xlogseq____&quot;,179,536870928]],[logseq____&quot;^15logseq____&quot;,[199,logseq____&quot;^Vlogseq____&quot;,205,536870928]],[logseq____&quot;^15logseq____&quot;,[199,logseq____&quot;^Ulogseq____&quot;,179,536870928]],[logseq____&quot;^15logseq____&quot;,[199,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u668d1e58-a529-44a4-984c-7f1c8f5d6b4dlogseq____&quot;,536870928]],[logseq____&quot;^15logseq____&quot;,[200,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;Ex: Faros, n8nlogseq____&quot;,536870928]],[logseq____&quot;^15logseq____&quot;,[200,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^18logseq____&quot;,536870928]],[logseq____&quot;^15logseq____&quot;,[200,logseq____&quot;^Flogseq____&quot;,238,536870928]],[logseq____&quot;^15logseq____&quot;,[200,logseq____&quot;^Xlogseq____&quot;,179,536870928]],[logseq____&quot;^15logseq____&quot;,[200,logseq____&quot;^Vlogseq____&quot;,238,536870928]],[logseq____&quot;^15logseq____&quot;,[200,logseq____&quot;^Ulogseq____&quot;,179,536870928]],[logseq____&quot;^15logseq____&quot;,[200,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u668d1e58-4d55       // This script checks to see if a redirect is present in the query string
