&quot;[[實例化需求 (Specification by Example)/1.Workshop]]&quot;,536870938]],[&quot;^14&quot;,[77,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[77,&quot;^E&quot;,93,536870938]],[&quot;^14&quot;,[77,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[77,&quot;^T&quot;,93,536870938]],[&quot;^14&quot;,[77,&quot;^S&quot;,44,536870938]],[&quot;^14&quot;,[77,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[77,&quot;^S&quot;,48,536870938]],[&quot;^14&quot;,[77,&quot;^S&quot;,51,536870938]],[&quot;^14&quot;,[77,&quot;^S&quot;,53,536870938]],[&quot;^14&quot;,[77,&quot;^G&quot;,44,536870938]],[&quot;^14&quot;,[77,&quot;^G&quot;,51,536870938]],[&quot;^14&quot;,[77,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[77,&quot;^:&quot;,&quot;~u62c8323d-a9e0-4ed0-8988-5659023b71e0&quot;,536870938]],[&quot;^14&quot;,[78,&quot;^P&quot;,&quot;從十年前的第一場DevOpsDays, Belgium, 2009，到傳統軟體公司想改變時已經是將近五年後的事，但在DevOps滿十年後的今天，你，想要變了嗎？當共享軟体當道，商業模式容易被複製，只要灑錢暫時也能雇用到不錯的工程師，所以長遠來看，企業的差異性與競爭力大概就只剩下企業文化與效率。&quot;,536870938]],[&quot;^14&quot;,[78,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[78,&quot;^E&quot;,85,536870938]],[&quot;^14&quot;,[78,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[78,&quot;^T&quot;,117,536870938]],[&quot;^14&quot;,[78,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[78,&quot;^S&quot;,52,536870938]],[&quot;^14&quot;,[78,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[78,&quot;^:&quot;,&quot;~u62c8323d-0383-4edd-a69d-0cfc019546e5&quot;,536870938]],[&quot;^14&quot;,[79,&quot;^P&quot;,&quot;面對日益複雜系統，出現問題是不可避免的，我們要做的是快速發現和解決問題，相反地指責只會導至恐俱文化，如此問題可能被隱藏直到災難的發生，所以團隊的免責文化、鼓勵試錯與快速學習才有助於創新\\n。另外從 [Google studies](https://diversity.lbl.gov/2019/05/13/the-quest-to-build-the-most-effective-teams/) 及 The [Westrum organizational culture](https://cloud.google.com/solutions/devops/devops-culture-westrum-organizational-culture) 裡面都提到心理安全的文化對於建立一個有效率的團隊和創意是至關重要的！&quot;,536870938]],[&quot;^14&quot;,[79,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[79,&quot;^E&quot;,116,536870938]],[&quot;^14&quot;,[79,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[79,&quot;^T&quot;,116,536870938]],[&quot;^14&quot;,[79,&quot;^S&quot;,41,536870938]],[&quot;^14&quot;,[79,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[79,&quot;^S&quot;,52,536870938]],[&quot;^14&quot;,[79,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[79,&quot;^:&quot;,&quot;~u62c8323d-aa27-4c01-8bd9-7b3f4d3f4f97&quot;,536870938]],[&quot;^14&quot;,[80,&quot;^P&quot;,&quot;再接下去的幾個章節中，會對這些實踐做更多的闡述或實作方法（很多方法其實跟你想的不一樣），包括有：&quot;,536870938]],[&quot;^14&quot;,[80,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[80,&quot;^E&quot;,90,536870938]],[&quot;^14&quot;,[80,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[80,&quot;^T&quot;,62,536870938]],[&quot;^14&quot;,[80,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[80,&quot;^S&quot;,48,536870938]],[&quot;^14&quot;,[80,&quot;^S&quot;,53,536870938]],[&quot;^14&quot;,[80,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[80,&quot;^:&quot;,&quot;~u62c8323d-d746-4b64-8077-a67ef99e3800&quot;,536870938]],[&quot;^14&quot;,[81,&quot;^P&quot;,&quot;好了，的確有另一些方法可以讓（軟體）開發更快、品質更好、更穩定等等。但我們現也做得不錯，也是能夠固定時間交付客戶所需要的功能，那我還需要改變嗎？？ 這邊就提到了持續改善的重要性，拿 [Uber](https://stackshare.io/stack-history-timeline-uber-tech-stack-evolution) 來說，它的商業模式並沒有太多改變，但其架構每兩年就大改一次，這改變不外乎是為了架構能容易擴展（scale out）及==當團隊快速增長時還能維持一樣的開發效率==。企業的起起落落，尤其是IT產業，當改變是被迫時，往往競爭者已攻城掠地，這時改變是壓力很大的，相反的，隨時都能持續改善，反而可以享受著指標數字隨著做為改變而不斷改進的成就感，兩者相差甚巨！&quot;,536870938]],[&quot;^14&quot;,[81,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[81,&quot;^E&quot;,117,536870938]],[&quot;^14&quot;,[81,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[81,&quot;^T&quot;,117,536870938]],[&quot;^14&quot;,[81,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[81,&quot;^S&quot;,52,536870938]],[&quot;^14&quot;,[81,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[81,&quot;^:&quot;,&quot;~u62c8323d-fd79-42ef-94dd-ba1686dfe81f&quot;,536870938]],[&quot;^14&quot;,[82,&quot;^P&quot;,&quot;實踐方法除了Agile 的 mindset, Scrum process 或是 DevOps Handbooks 中提到的三步工法等，但這些網路上已經有太多好文在講述其中的概念，==所以我更想用技術方面的實作來闡述所需相關的能力==。這些數位化的改革中，擁抱改變是必要的，因為每個人的工作模式多多少少都需要改變，比如說開發人員除了單元測試外也必需負責 \\&quot;Acceptance Test\\&quot; 的自動化創建與維護，以達到快速回饋與避免類似 \\&quot;Waterfall pipeline\\&quot; 的反模式產生（如下圖），這將會在『持續集成』的章節再詳述。&quot;,536870938]],[&quot;^14&quot;,[82,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[82,&quot;^E&quot;,62,536870938]],[&quot;^14&quot;,[82,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[82,&quot;^T&quot;,62,536870938]],[&quot;^14&quot;,[82,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[82,&quot;^S&quot;,48,536870938]],[&quot;^14&quot;,[82,&quot;^S&quot;,53,536870938]],[&quot;^14&quot;,[82,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[82,&quot;^:&quot;,&quot;~u62c8323d-3daa-4372-b187-643b6ca0a349&quot;,536870938]],[&quot;^14&quot;,[83,&quot;^P&quot;,&quot;![culture_explain](https://speakerd.s3.amazonaws.com/presentations/cf04f08b30f54c41ad76d0b180effd0b/slide_9.jpg)&quot;,536870938]],[&quot;^14&quot;,[83,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[83,&quot;^E&quot;,106,536870938]],[&quot;^14&quot;,[83,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[83,&quot;^T&quot;,106,536870938]],[&quot;^14&quot;,[83,&quot;^S&quot;,41,536870938]],[&quot;^14&quot;,[83,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[83,&quot;^S&quot;,52,536870938]],[&quot;^14&quot;,[83,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[83,&quot;^:&quot;,&quot;~u62c8323d-22b0-4768-98c5-c341d796d959&quot;,536870938]],[&quot;^14&quot;,[84,&quot;^P&quot;,&quot;![Shfit left &amp; right in DevOps](../assets/image_1649584756526_0.png)&quot;,536870938]],[&quot;^14&quot;,[84,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[84,&quot;^E&quot;,80,536870938]],[&quot;^14&quot;,[84,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[84,&quot;^T&quot;,62,536870938]],[&quot;^14&quot;,[84,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[84,&quot;^S&quot;,48,536870938]],[&quot;^14&quot;,[84,&quot;^S&q nce&quot;,536870938]],[&quot;^14&quot;,[109,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[109,&quot;^U&quot;,2,536870938]],[&quot;^14&quot;,[109,&quot;^E&quot;,64,536870938]],[&quot;^14&quot;,[109,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[109,&quot;^T&quot;,46,536870938]],[&quot;^14&quot;,[109,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[109,&quot;^1&gt;&quot;,2,536870938]],[&quot;^14&quot;,[109,&quot;^V&quot;,&quot;^1?&quot;,536870938]],[&quot;^14&quot;,[109,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[109,&quot;^:&quot;,&quot;~u62c8323d-0f49-48b9-97a2-6ddcdb15102a&quot;,536870938]],[&quot;^14&quot;,[110,&quot;^P&quot;,&quot;所以再深再廣的護城河，只要別人的效率是你的兩倍、五倍甚至十倍，那麼護城河也很快就會有被填滿的一天。 是的，就像 DevOps Handbooks 所提，==『改善日常工作甚至比進行日常工作更重要』==，而且要及早做，而非放到最後，層層堆疊，想改也改不動。方法就是用 3% ~ 5% 的開發人力或是至少 20% 的時間週期用於持續改善的活動，這當中就包含了==有意識地 (consciously)== 償還技術債及推動技術與架構的現代化。 架構要使團隊能够獨立開發、测試及向客户部署價值，減少跨團隊的協作與耦合，其中微服務（Microservices）間能有各自的軟體的交付週期（release cycle）便是其中一例！&quot;,536870938]],[&quot;^14&quot;,[110,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[110,&quot;^E&quot;,74,536870938]],[&quot;^14&quot;,[110,&quot;^W&quot;,46,536870938]],[&quot;^14&quot;,[110,&quot;^T&quot;,118,536870938]],[&quot;^14&quot;,[110,&quot;^S&quot;,46,536870938]],[&quot;^14&quot;,[110,&quot;^S&quot;,49,536870938]],[&quot;^14&quot;,[110,&quot;^S&quot;,52,536870938]],[&quot;^14&quot;,[110,&quot;^18&quot;,true,536870938]],[&quot;^14&quot;,[110,&quot;^:&quot;,&quot;~u62c8323d-f476-43a0-a848-e7e032b86993&quot;,536870938]],[&quot;^14&quot;,[111,&quot;^P&quot;,&quot;持續學習，對於競爭優勢就如同 [Dave West](https://www.infoq.cn/article/managing-next-century-agile/)所提及的：\\n&gt; Peter Senge 在其著作《The Fifth Discipline - The Art &amp; Practice Of The Learning Organization》中描述了組織專注於學習的必要性。「唯一可持續的競爭優勢是一個組織比競爭者更快速地學習的能力」。最終，通過專注於敏捷領導力、自組織、以客戶結果為中心、消除浪費以及瞭解組織文化並頻繁交付這 5 項挑戰，組織將變得更加專注於學習並變得更加敏捷。&quot;,536870938]],[&quot;^14&quot;,[111,&quot;^N&quot;,&quot;^17&quot;,536870938]],[&quot;^14&quot;,[111,&quot;^E&quot;,1 ,&quot;^T&quot;,44,536870948]],[&quot;^14&quot;,[177,&quot;^S&quot;,44,536870948]],[&quot;^14&quot;,[177,&quot;^1&gt;&quot;,2,536870948]],[&quot;^14&quot;,[177,&quot;^V&quot;,&quot;^1?&quot;,536870948]],[&quot;^14&quot;,[177,&quot;^18&quot;,true,536870948]],[&quot;^14&quot;,[177,&quot;^:&quot;,&quot;~u62c8323e-4c46-4eae-b7a6-9d57eb8f14c7&quot;,536870948]],[&quot;^14&quot;,[178,&quot;^P&quot;,&quot;![Excalidraw.png](../assets/Cursor_和_Excalidraw_1656909485713_0.png)&quot;,536870948]],[&quot;^14&quot;,[178,&quot;^N&quot;,&quot;^17&quot;,536870948]],[&quot;^14&quot;,[178,&quot;^E&quot;,217,536870948]],[&quot;^14&quot;,[178,&quot;^W&quot;,44,536870948]],[&quot;^14&quot;,[178,&quot;^T&quot;,217,536870948]],[&quot;^14&quot;,[178,&quot;^S&quot;,44,536870948]],[&quot;^14&quot;,[178,&quot;^18&quot;,true,536870948]],[&quot;^14&quot;,[178,&quot;^:&quot;,&quot;~u62c8323e-2a08-4208-b4dc-4f316bb4706a&quot;,536870948]],[&quot;^14&quot;,[179,&quot;^P&quot;,&quot;通常一個使用者故事能放進精煉會議做 AC 的討論，一般是經過以下三步驟：\\n* Phase 0 - Preparation of user stories (PO to prioritize, remove dependencies)：通常由 tech lead 與 PO 做先行的討論與排序出重要性並找出無其它依賴能做更細節展開討論的項目。\\n* Phase 1 - Estimate and split stories, consume / maintain product backlog：會議中 PO 說明故事卡內容並交由大家根據複雜度去估點或分拆為更小的使用者故事，重複步驟直到使用者故事複雜度小於 8 或 13 點 (根據團隊習慣)。\\n* Phase 2 - Key examples / acceptance criteria (for story point under 8/13)：對於夠小的故事根據重要性於會議中開始討論並產出此故事的驗收條件 (Acceptance Criteria)。&quot;,536870948]],[&quot;^14&quot;,[179,&quot;^N&quot;,&quot;^17&quot;,536870948]],[&quot;^14&quot;,[179,&quot;^E&quot;,233,536870948]],[&quot;^14&quot;,[179,&quot;^W&quot;,44,536870948]],[&quot;^14&quot;,[179,&quot;^T&quot;,233,536870948]],[&quot;^14&quot;,[179,&quot;^S&quot;,44,536870948]],[&quot;^14&quot;,[179,&quot;^18&quot;,true,536870948]],[&quot;^14&quot;,[179,&quot;^:&quot;,&quot;~u62c8323e-df2d-4879-8b64-98566901df71&quot;,536870948]],[&quot;^14&quot;,[180,&quot;^P&quot;,&quot;DOR → planning meeting&quot;,536870948]],[&quot;^14&quot;,[180,&quot;^N&quot;,&quot;^17&quot;,536870948]],[&quot;^14&quot;,[180,&quot;^E&quot;,211,536870948]],[&quot;^14&quot;,[180,&quot;^W&quot;,44,536870948]],[&quot;^14&quot;,[180,&quot;^T&quot;,211,536870948]],[&quot;^14&quot;,[180,&quot;^S&quot;,44,536870948]],[&quot;^14&quot;,[180,&quot;^18&quot;,true,536870948]],[&quot;^14&quot;,[180,&quot;^:&quot;,&quot;~u62c8323e-982a-459a-87e1-dbd8ff70efa4&quot;,536870948]],[&quot;^14&quot;,[181,&quot;^P&quot;,&quot;What is AC?\\n* AC 是用來探索需求的邊界 (Triple Constraint)，而不是嘗試完善需求\\n* AC 中要列出這需求最重要的事\\n  * Good paths\\n  * Significant error cases\\n  * Boundary cases\\n  * To explain the biz logics behind\\n  * Conclusions of arguing, disputes after discussion in the refinement meeting\\n* ==每個 user story 都要有 AC，但不是每個 user story 都要花時間討論 AC==&quot;,536870948]],[&quot;^14&quot;,[181,&quot;^N&quot;,&quot;^17&quot;,536870948]],[&quot;^14&quot;,[181,&quot;^E&quot;,216,536870948]],[&quot;^14&quot;,[181,&quot;^W&quot;,44,536870948]],[&quot;^14&quot;,[181,&quot;^T&quot;,197,536870948]],[&quot;^14&quot;,[181,&quot;^S&quot;,44,536870948]],[&quot;^14&quot;,[181,&quot;^18&quot;,true,536870948]],[&quot;^14&quot;,[181,&quot;^:&quot;,&quot;~u62c8323e-0d1a-4441-97fa-3183f148b76c&quot;,536870948]],[&quot;^14&quot;,[182,&quot;^P&quot;,&quot;DOD → task closed&quot;,536870948]],[&quot;^14&quot;,[182,&quot;^N&quot;,&quot;^17&quot;,536870948]],[&quot;^14&quot;,[182,&quot;^E&quot;,180,536870948]],[&quot;^14&quot;,[182,&quot;^W&quot;,44,536870948]],[&quot;^14&quot;,[182,&quot;^T&quot;,211,536870948]],[&quot;^14&quot;,[182,&quot;^S&quot;,44,536870948]],[&quot;^14&quot;,[182,&quot;^18&quot;,true,536870948]],[&quot;^14&quot;,[182,&quot;^:&quot;,&quot;~u62c8323e-d582-47e3-869b-89c0eb947273&quot;,536870948]],[&quot;^14&quot;,[183,&quot;^P&quot;,&quot;#+BEGIN_TIP\\n* One card one idea\\n* Don&apos;t write too much, only the content fits in a card\\n#+END_TIP&quot;,536870948]],[&quot;^14&quot;,[183,&quot;^N&quot;,&quot;^17&quot;,536870948]],[&quot;^14&quot;,[183,&quot;^E&quot;,185,536870948]],[&qu quot;^14&quot;,[240,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[240,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[240,&quot;^9&quot;,true,536870950]],[&quot;^14&quot;,[240,&quot;^&gt;&quot;,[&quot;^ &quot;,&quot;^1;&quot;,&quot;實例化需求 (Specification by Example)/2.Key Process Patterns&quot;,&quot;^16&quot;,true],536870950]],[&quot;^14&quot;,[240,&quot;^I&quot;,[&quot;^13&quot;,[&quot;^1;&quot;,&quot;^16&quot;]],536870950]],[&quot;^14&quot;,[240,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[240,&quot;^:&quot;,&quot;~u62c8323e-50e0-4b74-8de8-48001beda909&quot;,536870950]],[&quot;^14&quot;,[241,&quot;^P&quot;,&quot;#+BEGIN_NOTE\\n* 有了關鍵實例，是不是對實行 TDD 又更近了一步？\\n* What is unit test cases?\\n  * (x) Test implementation details (app classes, functions, ...)?\\n  * (x) 腦補的 test cases / user scenarios?\\n  * (v) Cases to fulfill acceptance criteria?\\n* What is acceptance tests:\\n  * Sum of key (available) features of the system\\n  * Executable specifications\\n#+END_NOTE&quot;,536870950]],[&quot;^14&quot;,[241,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[241,&quot;^E&quot;,248,536870950]],[&quot;^14&quot;,[241,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[241,&quot;^T&quot;,248,536870950]],[&quot;^14&quot;,[241,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[241,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[241,&quot;^:&quot;,&quot;~u62c8323e-6b00-4160-935d-5a5d065498de&quot;,536870950]],[&quot;^14&quot;,[242,&quot;^P&quot;,&quot;#+BEGIN_NOTE\\n* 別忘了，此處的關鍵實例或是之後精煉過的需求規格，也正是這個 sotry 能帶進 sprint planning meeting 做討論的條件之一，因為它正符合了 story DoR 的 \\&quot;checkable\\&quot; 條件！\\n\\n#+BEGIN_QUOTE\\n Sprint 正式開始之前，每個團隊將至少擁有一至兩個故事，且各自具備已經對自動化做好準備的、詳細的、附帶實例的 spec。~Gojko Adžić @ 《Specification by Example》\\n#+END_QUOTE\\n\\n* Story candidate 應該具備 V.I.N.C.E. 條件 or INVEST\\n  * 有價值（Valuable）：對使用者的價值有被清楚的表明\\n  * 可獨立（Independable）：沒有外部的相依性會阻礙這個story的完成\\n  * 可協調（Negotiable）：提供足夠細節但容許後續討論與更動\\n  * 可驗證（Checkable）： 所有驗收條件已經被清楚描述\\n  * 可估計（Estimable）：估算過且應該可以在一個sprint內完\\n#+END_NOTE&quot;,536870950]],[&quot;^14&quot;,[242,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[242,&quot;^E&quot;,254,536870950]],[&quot;^14&quot;,[242,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[242,&quot;^T&quot;,245,536870950]],[&quot;^14&quot;,[242,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[242,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[242,&quot;^:&quot;,&quot;~u62c8323e-8299-4347-aa1c-90815d7da1f2&quot;,536870950]],[&quot;^14&quot;,[243,&quot;^P&quot;,&quot;## 頻繁的驗證 (Validating frequently)\\n每當有程式碼提交到版本管控系統，則觸發相關的 continuous integration pipeline 自動執行這些自動化測試，以確保系統符合業務目標。\\n![image.png](../assets/image_1657019356205_0.png)&quot;,536870950]],[&quot;^14&quot;,[243,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[243,&quot;^U&quot;,2,536870950]],[&quot;^14&quot;,[243,&quot;^E&quot;,248,536870950]],[&quot;^14&quot;,[243,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[243,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[243,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[243,&quot;^1&gt;&quot;,2,536870950]],[&quot;^14&quot;,[243,&quot;^V&quot;,&quot;^1?&quot;,536870950]],[&quot;^14&quot;,[243,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[243,&quot;^:&quot;,&quot;~u62c8323e-869c-4b73-9255-bdb89f1903d6&quot;,536870950]],[&quot;^14&quot;,[244,&quot;^P&quot;,&quot;title:: 實例化需求 (Specification by Example)/Key Process Patterns&quot;,536870950]],[&quot;^14&quot;,[244,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[244,&quot;^E&quot;,240,536870950]],[&quot;^14&quot;,[244,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[244,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[244,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[244,&quot;^&gt;&quot;,[&quot;^ &quot;,&quot;^1;&quot;,&quot;實例化需求 (Specification by Example)/Key Process Patterns&quot;],536870950]],[&quot;^14&quot;,[244,&quot;^I&quot;,[&quot;^13&quot;,[&quot;^1;&quot;]],536870950]],[&quot;^14&quot;,[244,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[244,&quot;^:&quot;,&quot;~u62c8323e-a3bf-47cb-939a-a3515284846e&quot;,536870950]],[&quot;^14&quot;,[245,&quot;^P&quot;,&quot;## 關鍵實例 (Determine Key Examples)\\n團隊成員通過工作坊的方式制定需求規格，通常來說，先用實例來描述，推測一些規律，轉成用表格表達，可能發現更準確的規律。\\nEvery acceptance criterion generates new examples; every example generates new scenarios. Teams should refine their specifications to merge similar examples, reject the ones that introduce noise, and choose the most meaningful or descriptive ones.&quot;,536870950]],[&quot;^14&quot;,[245,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[245,&quot;^U&quot;,2,536870950]],[&quot;^14&quot;,[245,&quot;^E&quot;,251,536870950]],[&quot;^14&quot;,[245,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[245,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[245,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[245,&quot;^1&gt;&quot;,2,536870950]],[&quot;^14&quot;,[245,&quot;^V&quot;,&quot;^1?&quot;,536870950]],[&quot;^14&quot;,[245,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[245,&quot;^:&quot;,&quot;~u62c8323e-18ca-4825-a2d0-c4e3d363a9b7&quot;,536870950]],[&quot;^14&quot;,[246,&quot;^P&quot;,&quot;#+BEGIN_CAUTION\\n從上一步驟你應該發現，自動化測試的目標為精煉過後的 key examples，沒錯就是＂關鍵實例＂！一般常見的錯誤印象就是 CI Pipeline 的 automation 就是要做好做滿，所有的手動測試案例都應該要變成自動化，這樣的 coverage 才會高，對 pipeline 的結果才會有信心 ，其實是適得其反 ... 最重要的其實是要把能闡述業務邏輯與行為的關鍵實例作自動化就好，並且要讓團隊了解 pipeline 執行的內容，清楚了解對於使用者最重要的案例都已經自動驗證過了，這才是 CI pipeline 信心的來源！\\nReference: ((62ba9533-3e8b-4ed1-a3cd-1f8143878aae)) \\n#+END_CAUTION&quot;,536870950]],[&quot;^14&quot;,[246,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[246,&quot;^E&quot;,241,536870950]],[&quot;^14&quot;,[246,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[246,&quot;^T&quot;,248,536870950]],[&quot;^14&quot;,[246,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[246,&quot;^G&quot;,250,536870950]],[&quot;^14&quot;,[246,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[246,&quot;^:&quot;,&quot;~u62c8323e-4c49-4655-9088-4a620b2c08ca&quot;,536870950]],[&quot;^14&quot;,[247,&quot;^P&quot;,&quot;## 精煉需求規格 (Refining the specification)\\n需求規格應該是精確、能被驗證、不言自明並且是跟商業規則有關係的。承上信用卡清算案例，一個明確的需求規格如下：\\n![image.png](../assets/image_1656923937867_0.png)\\nReference:  [《Fifty Quick Ideas To Improve Your Tests》](https://leanpub.com/50quickideas-tests)&quot;,536870950]],[&quot;^14&quot;,[247,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[247,&quot;^U&quot;,2,536870950]],[&quot;^14&quot;,[247,&quot;^E&quot;,245,536870950]],[&quot;^14&quot;,[247,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[247,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[247,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[247,&quot;^1&gt;&quot;,2,536870950]],[&quot;^14&quot;,[247,&quot;^V&quot;,&quot;^1?&quot;,536870950]],[&quot;^14&quot;,[247,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[247,&quot;^:&quot;,&quot;~u62c8323e-5f6a-404d-a5f2-5be414a0f0e5&quot;,536870950]],[&quot;^14&quot;,[248,&quot;^P&quot;,&quot;## 進行自動化驗證 (Automating validation without changing specifications)\\n以自動化測試驗證實作標的來確保符合商業需求，實作 executable specifications 部份，後面章節會有相關程式碼展示。所以這些可被執行的規格文檔可用來說明程式的功能 (functionality) 與行為 (behaviors)，並針對當下的程式代碼檢驗規格的完整性 (compliance)。\\n![image.png](../assets/image_1657007893203_0.png)&quot;,536870950]],[&quot;^14&quot;,[248,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[248,&quot;^U&quot;,2,536870950]],[&quot;^14&quot;,[248,&quot;^E&quot;,247,536870950]],[&quot;^14&quot;,[248,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[248,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[248,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[248,&quot;^1&gt;&quot;,2,536870950]],[&quot;^14&quot;,[248,&quot;^V&quot;,&quot;^1?&quot;,536870950]],[&quot;^14&quot;,[248,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[248,&quot;^:&quot;,&quot;~u62c8323e-e506-49aa-aab9-30bdb9967c02&quot;,536870950]],[&quot;^14&quot;,[249,&quot;^P&quot;,&quot;## 演變為說明文件系統 (Evolving a documentation system)\\n藉由不斷地更新需求規格 (specifications) 來反映商業邏輯上的變化，並演化成活的說明文件系統 (Living Documentation)。如何從規格文檔產生活文件，實作部份後面章節會有相關展示。&quot;,536870950]],[&quot;^14&quot;,[249,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[249,&quot;^U&quot;,2,536870950]],[&quot;^14&quot;,[249,&quot;^E&quot;,243,536870950]],[&quot;^14&quot;,[249,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[249,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[249,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[249,&quot;^1&gt;&quot;,2,536870950]],[&quot;^14&quot;,[249,&quot;^V&quot;,&quot;^1?&quot;,536870950]],[&quot;^14&quot;,[249,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[249,&quot;^:&quot;,&quot;~u62c8323e-0cea-4982-9e81-d52388a46930&quot;,536870950]],[&quot;^14&quot;,[250,&quot;^P&quot;,&quot;### 對 CI Pipeline 的信心\\nid:: 62ba9533-3e8b-4ed1-a3cd-1f8143878aae\\n#+BEGIN_QUOTE\\nWhat we see sometimes is, folks are very focused on automation and speeding things up, but not like, am I actually getting what I want from it? So for example, again, back to the automated testing example, often regression tests, there’s a lot of focus on ==automating everything==, but sometimes the output, the test results, are ==too difficult for a team to actually understand== that they disregard the test.                 ~ Tim Cochran, Technical director at ThoughtWorks\\n#+END_QUOTE\\n一樣的，今天 pipeline 檢查了很多東西，但大家還是沒有信心，為何呢？ 因為沒有一個人真正了解整個測試的內容！RD 的 unit test，QA 的 integration test，都是沒有充分溝通的狀況下，各別自由發揮，以至於到後來彼此都不知道對方的做了些什麼，有什麼沒做，就連 Service QA 或 PM 也都無法掌握。==而 SbE 讓全部的人對產品需求有一致共識與針對 key examples 所撰寫的自動化測試，才是讓大家對 pipeline 檢查內容有全面了解的作法！==\\n![image.png](../assets/image_1656395591931_0.png)&quot;,536870960]],[&quot;^14&quot;,[250,&quot;^N&quot;,&quot;^17&quot;,536870960]],[&quot;^14&quot;,[250,&quot;^U&quot;,3,536870960]],[&quot;^14&quot;,[250,&quot;^E&quot;,300,536870960]],[&quot;^14&quot;,[250,&quot;^W&quot;,51,536870960]],[&quot;^14&quot;,[250,&quot;^T&quot;,299,536870960]],[&quot;^14&quot;,[250,&quot;^S&quot;,51,536870960]],[&quot;^14&quot;,[250,&quot;^&gt;&quot;,[&quot;^ &quot;,&quot;^1A&quot;,&quot;62ba9533-3e8b-4ed1-a3cd-1f8143878aae&quot;],536870960]],[&quot;^14&quot;,[250,&quot;^I&quot;,[&quot;^13&quot;,[&quot;^1A&quot;]],536870960]],[&quot;^14&quot;,[250,&quot;^1&gt;&quot;,3,536870960]],[&quot;^14&quot;,[250,&quot;^V&quot;,&quot;^1?&quot;,536870960]],[&quot;^14&quot;,[250,&quot;^18&quot;,true,536870960]],[&quot;^14&quot;,[250,&quot;^:&quot;,&quot;~u62ba9533-3e8b-4ed1-a3cd-1f8143878aae&quot;,536870950]],[&quot;^14&quot;,[251,&quot;^P&quot;,&quot;## 協作制定需求規格 (Specifying Collaboratively)\\nSbE 的重點之一，經由團隊的共同討論 (face-to-face with whiteboard) 並探索出最佳解法 (solutions)。\\n![image.png](../assets/image_1656916571952_0.png)\\nFigure. Illustrating specifying collaboratively, by Gojko and Jeff Patton &amp; Associates&quot;,536870950]],[&quot;^14&quot;,[251,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[251,&quot;^U&quot;,2,536870950]],[&quot;^14&quot;,[251,&quot;^E&quot;,253,536870950]],[&quot;^14&quot;,[251,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[251,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[251,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[251,&quot;^1&gt;&quot;,2,536870950]],[&quot;^14&quot;,[251,&quot;^V&quot;,&quot;^1?&quot;,536870950]],[&quot;^14&quot;,[251,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[251,&quot;^:&quot;,&quot;~u62c8323e-2d3a-4ab7-b4e8-1699f04cbe76&quot;,536870950]],[&quot;^14&quot;,[252,&quot;^P&quot;,&quot;#+BEGIN_TIP\\n Good specifications\\n* Have a concise description\\n* Have a clear model\\n* Use business language\\n* Show a clear connection between inputs and outputs\\n* ==Describe (focus on) WHAT not HOW==\\n* ==Avoid GUI specifics==\\n#+END_TIP\\n![image.png](../assets/image_1656923368787_0.png) \\nReference:  [《Fifty Quick Ideas To Improve Your Tests》](https://leanpub.com/50quickideas-tests)\\n思考點：當預付點數只剩 6.95 元，但票價要 7 元時，你買還是不賣這票呢？&quot;,536870950]],[&quot;^14&quot;,[252,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[252,&quot;^E&quot;,247,536870950]],[&quot;^14&quot;,[252,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[252,&quot;^T&quot;,247,536870950]],[&quot;^14&quot;,[252,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[252,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[252,&quot;^:&quot;,&quot;~u62c8323e-19f4-43f1-b2f9-f903eea45602&quot;,536870950]],[&quot;^14&quot;,[253,&quot;^P&quot;,&quot;## 從目標中獲取範圍 (Deriving scope from goals)\\n團隊以客戶的業務目標開始，經由協作了解背後的價值並界定預計達成的目標範圍，產生使用者故事 (user stories) 並且能簡單舉例 (high level examples) 說明之。&quot;,536870950]],[&quot;^14&quot;,[253,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[253,&quot;^U&quot;,2,536870950]],[&quot;^14&quot;,[253,&quot;^E&quot;,238,536870950]],[&quot;^14&quot;,[253,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[253,&quot;^T&quot;,236,536870950]],[&quot;^14&quot;,[253,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[253,&quot;^1&gt;&quot;,2,536870950]],[&quot;^14&quot;,[253,&quot;^V&quot;,&quot;^1?&quot;,536870950]],[&quot;^14&quot;,[253,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[253,&quot;^:&quot;,&quot;~u62c8323e-8ed2-47a0-aee6-7149ec608a62&quot;,536870950]],[&quot;^14&quot;,[254,&quot;^P&quot;,&quot;#+BEGIN_TIP\\nKey examples\\n*  A small number of relatively simple scenario\\n* ==Easy to evaluate and argue about boundary conditions==\\n* Easier to discover and resolve inconsistencies\\n* (raw examples won&apos;t provide above two advantages)\\n* Right level of abstraction to describe situation better\\n* Satisfy business needs faster\\n* Modularized software reduces future maintenance costs\\n#+END_TIP&quot;,536870950]],[&quot;^14&quot;,[254,&quot;^N&quot;,&quot;^17&quot;,536870950]],[&quot;^14&quot;,[254,&quot;^E&quot;,237,536870950]],[&quot;^14&quot;,[254,&quot;^W&quot;,236,536870950]],[&quot;^14&quot;,[254,&quot;^T&quot;,245,536870950]],[&quot;^14&quot;,[254,&quot;^S&quot;,236,536870950]],[&quot;^14&quot;,[254,&quot;^18&quot;,true,536870950]],[&quot;^14&quot;,[254,&quot;^:&quot;,&quot;~u62c8323e-99c7-40df-941d-410553c2dabb&quot;,5368 6870966]],[&quot;^14&quot;,[330,&quot;^U&quot;,3,536870966]],[&quot;^14&quot;,[330,&quot;^E&quot;,343,536870966]],[&quot;^14&quot;,[330,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[330,&quot;^T&quot;,323,536870966]],[&quot;^14&quot;,[330,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[330,&quot;^1&gt;&quot;,3,536870966]],[&quot;^14&quot;,[330,&quot;^V&quot;,&quot;^1?&quot;,536870966]],[&quot;^14&quot;,[330,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[330,&quot;^:&quot;,&quot;~u62c8323f-f8df-4b52-bc8d-b51e5b724ff9&quot;,536870966]],[&quot;^14&quot;,[331,&quot;^P&quot;,&quot;單主幹開發 (trunk-based development)：主要以 if ... else 的邏輯單元搭配功能開關 (feature toggle) 來讓程式行為發生改變。&quot;,536870966]],[&quot;^14&quot;,[331,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[331,&quot;^E&quot;,345,536870966]],[&quot;^14&quot;,[331,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[331,&quot;^T&quot;,343,536870966]],[&quot;^14&quot;,[331,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[331,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[331,&quot;^:&quot;,&quot;~u62c8323f-766e-44cc-955e-a046f736f762&quot;,536870966]],[&quot;^14&quot;,[332,&quot;^P&quot;,&quot;使用功能分支的好處：大家應該都很熟，請自由發揮~~&quot;,536870966]],[&quot;^14&quot;,[332,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[332,&quot;^E&quot;,331,536870966]],[&quot;^14&quot;,[332,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[332,&quot;^T&quot;,343,536870966]],[&quot;^14&quot;,[332,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[332,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[332,&quot;^:&quot;,&quot;~u62c8323f-fc0b-401a-a864-723b9d0b3704&quot;,536870966]],[&quot;^14&quot;,[333,&quot;^P&quot;,&quot;對於 DevOps 所以提倡的主幹開發跟大部份人所熟悉的 feature branches 開發模式，兩者大相徑庭，在同個團隊中也無法混合使用。對於有興趣採用 DevOps 效率文化的團隊，是否應該設立流程方法與目標，進而一步步實踐呢？以下就常見的幾個場景，對於不同選擇所想解決的問題及面臨到的困難，簡單敘述一下，希望能幫助大家思考。&quot;,536870966]],[&quot;^14&quot;,[333,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[333,&quot;^E&quot;,328,536870966]],[&quot;^14&quot;,[333,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[333,&quot;^T&quot;,328,536870966]],[&quot;^14&quot;,[333,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[333,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[333,&quot;^:&quot;,&quot;~u62c8323f-dd1c-42b3-8b27-5a0ff8983ed0&quot;,536870966]],[&quot;^14&quot;,[334,&quot;^P&quot;,&quot;過去幾年來，我們所推動的各項要求與改變，都是在為了同一個目標所努力，並非主管或團隊領導的個人選擇與偏好。個人建議團隊還是應該對於開發流程與目標進行深入的學習與討論，以便取得共識。最不希望見到的結果就是，大家沒有共識，所以在進行技術棧的選擇與採用時沒有一個標準與目標，只要方便或容易實踐就選擇它 ......\\n最後只要沒有目標，幾年後，你會發現，大家還是在原地打轉！！&quot;,536870966]],[&quot;^14&quot;,[334,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[334,&quot;^E&quot;,338,536870966]],[&quot;^14&quot;,[334,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[334,&quot;^T&quot;,338,536870966]],[&quot;^14&quot;,[334,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[334,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[334,&quot;^:&quot;,&quot;~u62c8323f-1a37-447f-8438-dc1a04721382&quot;,536870966]],[&quot;^14&quot;,[335,&quot;^P&quot;,&quot;TBD 被視為實踐真正的持續整合 (Continuous Integration) 所必需採用的方法，因為大家都在主幹上開發且每天至少要與主幹整合一次，所以當 pipeline 結果為失敗時，所有的功能開發就必需暫停下來，所以才會有所謂的 time-box fixing 的規則，亦即所有 pipeline 的失敗必需要在一個固定時間內修復 (ex: 15 mins)，否則造成失敗的 commit 就必須被回滾 (rollback)。所以在這樣的規則下，RD 提交程式代碼到主幹造成自動化整合測試失敗的結果是無法被接受的，==也沒有足夠時間等到 AE 提交相對應整合測試代碼的修改==。&quot;,536870966]],[&quot;^14&quot;,[335,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[335,&quot;^E&quot;,341,536870966]],[&quot;^14&quot;,[335,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[335,&quot;^T&quot;,330,536870966]],[&quot;^14&quot;,[335,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[335,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[335,&quot;^:&quot;,&quot;~u62c8323f-6c35-4042-9e48-184ab463489f&quot;,536870966]],[&quot;^14&quot;,[336,&quot;^P&quot;,&quot;要專注的點並非要如何讓數字變得好看，而是==背後能改善這些指標的 \\&quot;technical practices\\&quot;！==從底層去實踐真正的 CI/CD、主幹開發、低耦合架構、可觀測性等等的工法才是落實 DevOps 文化與精神。圖中所列出的 \\&quot;technical practices\\&quot; 其實背後都有資料模型佐證這些工法的落實是對軟件的交付與運維指標有顯著的正向影響力。&quot;,536870966]],[&quot;^14&quot;,[336,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[336,&quot;^E&quot;,339,536870966]],[&quot;^14&quot;,[336,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[336,&quot;^T&quot;,327,536870966]],[&quot;^14&quot;,[336,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[336,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[336,&quot;^:&quot;,&quot;~u62c8323f-c026-43a8-ab50-b73382b68aa1&quot;,536870966]],[&quot;^14&quot;,[337,&quot;^P&quot;,&quot;public:: true\\ntype:: blogpost\\n\\n&quot;,536870966]],[&quot;^14&quot;,[337,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[337,&quot;^E&quot;,323,536870966]],[&quot;^14&quot;,[337,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[337,&quot;^T&quot;,323,536870966]],[&quot;^14&quot;,[337,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[337,&quot;^9&quot;,true,536870966]],[&quot;^14&quot;,[337,&quot;^&gt;&quot;,[&quot;^ &quot;,&quot;^16&quot;,true,&quot;^1:&quot;,&quot;blogpost&quot;],536870966]],[&quot;^14&quot;,[337,&quot;^I&quot;,[&quot;^13&quot;,[&quot;^16&quot;,&quot;^1:&quot;]],536870966]],[&quot;^14&quot;,[337,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[337,&quot;^:&quot;,&quot;~u62c8323f-6050-4992-a5af-fdfc3358bca1&quot;,536870966]],[&quot;^14&quot;,[338,&quot;^P&quot;,&quot;## 結論&quot;,536870966]],[&quot;^14&quot;,[338,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[338,&quot;^U&quot;,2,536870966]],[&quot;^14&quot;,[338,&quot;^E&quot;,327,536870966]],[&quot;^14&quot;,[338,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[338,&quot;^T&quot;,323,536870966]],[&quot;^14&quot;,[338,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[338,&quot;^1&gt;&quot;,2,536870966]],[&quot;^14&quot;,[338,&quot;^V&quot;,&quot;^1?&quot;,536870966]],[&quot;^14&quot;,[338,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[338,&quot;^:&quot;,&quot;~u62c8323f-da6c-4c18-a78b-ccceebb70318&quot;,536870966]],[&quot;^14&quot;,[339,&quot;^P&quot;,&quot;[The four key metrics](https://itrevolution.com/measure-software-delivery-performance-four-key-metrics/): \\n* Delivery lead time\\n* Deployment frequency\\n* Mean time to restore service\\n* Change fail rate&quot;,536870966]],[&quot;^14&quot;,[339,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[339,&quot;^E&quot;,327,536870966]],[&quot;^14&quot;,[339,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[339,&quot;^T&quot;,327,536870966]],[&quot;^14&quot;,[339,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[339,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[339,&quot;^:&quot;,&quot;~u62c8323f-f470-48cc-94e0-d259db1b25dd&quot;,536870966]],[&quot;^14&quot;,[340,&quot;^P&quot;,&quot;分支模式為兩種方法的主要差異所在，而這差異將左右後續整個開發流程的不同與效率。&quot;,536870966]],[&quot;^14&quot;,[340,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[340,&quot;^E&quot;,343,536870966]],[&quot;^14&quot;,[340,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[340,&quot;^T&quot;,343,536870966]],[&quot;^14&quot;,[340,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[340,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[340,&quot;^:&quot;,&quot;~u62c8323f-29fc-4932-9e1c-14b8ab98e14c&quot;,536870966]],[&quot;^14&quot;,[341,&quot;^P&quot;,&quot;在 feature branch 的開發模式下，蠻多團隊是 RD 寫單元測試而 AE 則負責自動化整合測試。當然兩者的代碼會在 \\&quot;integrated branch\\&quot; 上先做整合，完成整合測試後才會提交到主幹上面。所以一般 \\&quot;integrated  branch\\&quot; 在開發初期 pipeline 一般都會是紅色的 (pipeline CI failed)，一直要到給 QA 做測試的前幾天才比較有機會轉成綠色。但這樣的 RD 與 AE 的分工模式在單主幹開發 (Trunk-based development, TBD) 上卻難以施行！&quot;,536870966]],[&quot;^14&quot;,[341,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[341,&quot;^E&quot;,330,536870966]],[&quot;^14&quot;,[341,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[341,&quot;^T&quot;,330,536870966]],[&quot;^14&quot;,[341,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[341,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[341,&quot;^:&quot;,&quot;~u62c8323f-18b4-47b2-a42e-0d8ec67aad37&quot;,536870966]],[&quot;^14&quot;,[342,&quot;^P&quot;,&quot;另外在網路層採用流量分流 (traffic splitting) 或是利用 Ingress 的 middleware 或是 service mesh 的方法來實作 blue-green deployment 或是 canary release，也不失為一個可考慮的方向。但是這邊要思考的點是，在微服務或架構複雜的情況下，這樣的作法能否達到==同時有許多的 features== 在生產線上做 canary 或 A/B testings 而彼此間不會互相影響呢？&quot;,536870966]],[&quot;^14&quot;,[342,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[342,&quot;^E&quot;,325,536870966]],[&quot;^14&quot;,[342,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[342,&quot;^T&quot;,346,536870966]],[&quot;^14&quot;,[342,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[342,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[342,&quot;^:&quot;,&quot;~u62c8323f-378a-43d8-aea7-59002f6f4ef1&quot;,536870966]],[&quot;^14&quot;,[343,&quot;^P&quot;,&quot;### Branch Model&quot;,536870966]],[&quot;^14&quot;,[343,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[343,&quot;^U&quot;,3,536870966]],[&quot;^14&quot;,[343,&quot;^E&quot;,328,536870966]],[&quot;^14&quot;,[343,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[343,&quot;^T&quot;,323,536870966]],[&quot;^14&quot;,[343,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[343,&quot;^1&gt;&quot;,3,536870966]],[&quot;^14&quot;,[343,&quot;^V&quot;,&quot;^1?&quot;,536870966]],[&quot;^14&quot;,[343,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[343,&quot;^:&quot;,&quot;~u62c8323f-4f87-4003-ab31-21d05ce3cd82&quot;,536870966]],[&quot;^14&quot;,[344,&quot;^P&quot;,&quot;![whats-goal1x.png](../assets/whats-goal1x_1655798926267_0.png)&quot;,536870966]],[&quot;^14&quot;,[344,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[344,&quot;^E&quot;,337,536870966]],[&quot;^14&quot;,[344,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[344,&quot;^T&quot;,323,536870966]],[&quot;^14&quot;,[344,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[344,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[344,&quot;^:&quot;,&quot;~u62c8323f-fc08-49bc-a25f-693a6570138d&quot;,536870966]],[&quot;^14&quot;,[345,&quot;^P&quot;,&quot;功能分支 (feature branch)：主要以不同的 git branch 來區分新與舊之間的代碼。&quot;,536870966]],[&quot;^14&quot;,[345,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[345,&quot;^E&quot;,340,536870966]],[&quot;^14&quot;,[345,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[345,&quot;^T&quot;,343,536870966]],[&quot;^14&quot;,[345,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[345,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[345,&quot;^:&quot;,&quot;~u62c8323f-236f-453b-9d32-f6790e0c6271&quot;,536870966]],[&quot;^14&quot;,[346,&quot;^P&quot;,&quot;### Release Strategies&quot;,536870966]],[&quot;^14&quot;,[346,&quot;^N&quot;,&quot;^17&quot;,536870966]],[&quot;^14&quot;,[346,&quot;^U&quot;,3,536870966]],[&quot;^14&quot;,[346,&quot;^E&quot;,330,536870966]],[&quot;^14&quot;,[346,&quot;^W&quot;,323,536870966]],[&quot;^14&quot;,[346,&quot;^T&quot;,323,536870966]],[&quot;^14&quot;,[346,&quot;^S&quot;,323,536870966]],[&quot;^14&quot;,[346,&quot;^1&gt;&quot;,3,536870966]],[&quot;^14&quot;,[346,&quot;^V&quot;,&quot;^1?&quot;,536870966]],[&quot;^14&quot;,[346,&quot;^18&quot;,true,536870966]],[&quot;^14&quot;,[346,&quot;^:&quot;,&quot;~u62c8323f-a989-445e-b7cd-a446fe1838c3&quot;,536870966]],[&quot;^14&quot;,[347,&quot;^2&quot;,1,536870968]],[&quot;^14&quot;,[347,&quot;^R&quot;,&quot;^2&quot;,536870968]],[&quot;^14&quot;,[348,&quot;^R&quot;,&quot;^Q&quot;,536870969]]]]]]"</script><script>window.logseq_state="{:ui/theme \"dark\", :ui/sidebar-collapsed-blocks {}, :ui/show-recent? false, :config {\"local\" {:shortcuts {}, :default-templates {:journals \"\"}, :feature/enable-journals? false, :macros {}, :shortcut/doc-mode-enter-for-new-block? false, :favorites [\"實例化需求 (Specification by Example)\" \"實例化需求 (specification by examples)/workshop\" \"DevOps十年了，你，想改變了嗎?\" \"開發流程的共識與目標\" \"實例化需求 (Specification by Examples)\" \"devops十年了，你，想改變了嗎？\"], :ui/show-empty-bullets? false, :preferred-workflow :now, :journal/page-title-format \"yyyy年MM月dd日\", :publishing/all-pages-public? false, :ref/default-open-b
